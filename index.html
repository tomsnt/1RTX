<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE YOURSELF FREELY</title>
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <!-- Canvas per il logo con effetto warp fluido -->
    <canvas id="logo-canvas" style="position:fixed; top:25vh; left:50%; transform:translate(-50%,-50%); z-index:200; pointer-events:none; mix-blend-mode:lighten;"></canvas>
    
    <!-- Immagine centrata (nascosta, usata come source) -->
    <div id="center-logo" style="display:none;">
        <img src="img/LOGO-3d-sito.png" alt="Logo">
    </div>
    
    <!-- Codice glitch -->
    <a id="glitch-code" href="https://youtu.be/Eo8M0lYTQlU" target="_blank">
        <span id="glitch-display">2026 ANNIVERSARY DJ SET</span>
    </a>
    
    <!-- Canvas per il rumore granulare principale -->
    <canvas id="noise"></canvas>
    
    <!-- Canvas per effetti psichedelici -->
    <canvas id="psychedelic"></canvas>
    
    <!-- Container per le scie di disturbo -->
    <div id="distortion-trails"></div>
    
    <!-- Linee di scansione animate -->
    <div id="scanlines"></div>
    
    <!-- Bande di interferenza -->
    <div id="interference-bands"></div>
    
    <script src="script.js?v=4"></script>
</body>
</html>
